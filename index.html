body.locked{overflow:hidden}
#login.awlogin{position:fixed;inset:0;z-index:12000;overflow:auto;background:#070707;color:#FCFCFC;

  transition:opacity 1s cubic-bezier(.7,0,.2,1),transform 1s cubic-bezier(.7,0,.2,1),visibility 1s;}

.aw-head{position:absolute;top:clamp(26px,4vh,46px);left:clamp(28px,5vw,64px);z-index:6;color:#FCFCFC;width:clamp(150px,15vw,210px)}

.aw-split{position:relative;z-index:1;min-height:100vh;display:grid;grid-template-columns:1.25fr .9fr}

.aw-fx span{position:absolute;border-radius:50%;filter:blur(80px);opacity:.6;mix-blend-mode:screen;animation:awdrift 16s ease-in-out infinite alternate}
.aw-fx span:nth-child(1){width:34vw;height:34vw;background:#C7B1FF;left:-8%;top:-14%}
.aw-fx span:nth-child(2){width:26vw;height:26vw;background:#FF6F3C;left:30%;top:30%;animation-delay:-5s}
.aw-fx span:nth-child(3){width:30vw;height:30vw;background:#334FD7;left:-4%;bottom:-20%;animation-delay:-9s}
.aw-fx span:nth-child(4){width:26vw;height:26vw;background:#FEABFF;right:-4%;top:6%;animation-delay:-12s}
.aw-fx span:nth-child(5){width:20vw;height:20vw;background:#FFFF7D;right:14%;bottom:0;opacity:.4;animation-delay:-7s}

.aw-spot{position:absolute;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(520px circle at var(--mx,30%) var(--my,40%),rgba(199,177,255,.22),rgba(255,111,60,.08) 42%,transparent 62%);transition:background .1s ease-out}
.aw-stage>*{position:relative;z-index:1}
.aw-kicker{font-size:.74rem;letter-spacing:.12em;text-transform:uppercase;color:#C7B1FF;font-weight:600;max-width:46ch;line-height:1.6;
  opacity:0;transform:translateY(20px);animation:awup .8s cubic-bezier(.16,1,.3,1) .15s forwards}
.aw-sub{max-width:46ch;margin:1.5rem 0 0;font-size:.95rem;line-height:1.5;color:rgba(252,252,252,.6);opacity:0;transform:translateY(20px);animation:awup .8s cubic-bezier(.16,1,.3,1) .58s forwards}
.aw-tag{font-family:"Clash Display",sans-serif;font-weight:600;font-size:clamp(2.3rem,4.7vw,4rem);line-height:1.0;letter-spacing:-.025em;margin:1.3rem 0 0;max-width:16ch}
.aw-tag .line{display:block;overflow:hidden;padding-bottom:.1em}
.aw-tag .line>span{display:block;transform:translateY(115%);animation:awrise 1s cubic-bezier(.16,1,.3,1) forwards}
.aw-tag .hl{background:#FFFF7D;color:#0A0A0A;padding:.02em .14em;border-radius:.07em;-webkit-box-decoration-break:clone;box-decoration-break:clone;clip-path:inset(0 100% 0 0);animation:awmark .9s cubic-bezier(.16,1,.3,1) 1.05s forwards}
@keyframes awmark{to{clip-path:inset(0 0 0 0)}}
@keyframes awrise{to{transform:translateY(0)}}
.aw-steps{margin-top:2.6rem;opacity:0;transform:translateY(20px);animation:awup .8s cubic-bezier(.16,1,.3,1) .9s forwards}
.aw-steps .s-lbl{font-size:.76rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(252,252,252,.5);margin-bottom:1rem}
.aw-chips{display:flex;gap:.7rem;flex-wrap:wrap;position:relative}
.aw-chips::before{content:"";position:absolute;left:12px;right:12px;top:23px;height:1px;background:repeating-linear-gradient(90deg,rgba(255,255,255,.16) 0 6px,transparent 6px 12px);z-index:0}
.aw-badge{display:inline-flex;align-items:center;gap:.7rem;background:#C1F1AA;color:#15101F;font-family:"Clash Display",sans-serif;font-weight:600;font-size:.98rem;letter-spacing:-.01em;padding:.72rem 1.25rem .72rem 1rem;border-radius:100px;box-shadow:0 16px 34px -12px rgba(193,241,170,.6);transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s}
.aw-badge:hover{transform:translateY(-4px);box-shadow:0 22px 44px -14px rgba(193,241,170,.75)}
.aw-badge .dot{width:9px;height:9px;border-radius:50%;background:#FF6F3C;flex:none;box-shadow:0 0 0 4px rgba(255,111,60,.25)}
.aw-badge b{font-weight:700}
.aw-badge .sep{opacity:.5;font-weight:500;margin:0 -.15rem}
.aw-chip{position:relative;z-index:1;width:46px;height:46px;border-radius:14px;display:grid;place-items:center;font-family:"Clash Display",sans-serif;font-weight:600;font-size:1.05rem;color:#0A0A0A;transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s}
.aw-chip:hover{transform:translateY(-5px);box-shadow:0 14px 28px -8px var(--c)}
.aw-panel{position:relative;background:#C7B1FF;color:#15101F;display:flex;flex-direction:column;justify-content:center;
  padding:clamp(48px,6vw,84px) clamp(34px,4.5vw,68px);overflow:hidden;
  opacity:0;transform:scale(.985);animation:awpan 1s cubic-bezier(.16,1,.3,1) .35s forwards}
@keyframes awpan{to{transform:none;opacity:1}}
.aw-panel::before{content:"";position:absolute;right:-30%;bottom:-30%;width:70%;height:70%;border-radius:50%;background:radial-gradient(circle,rgba(255,255,125,.5),transparent 65%)}
.aw-pin{position:relative}
.aw-pin .c-lbl{font-family:"Clash Display",sans-serif;font-weight:600;font-size:clamp(1.5rem,2.3vw,2rem);line-height:1.05}
.aw-pin .c-sub{font-size:.88rem;color:rgba(21,16,31,.62);margin:.4rem 0 1.9rem;max-width:34ch}
.aw-field{margin-bottom:1rem}
.aw-field label{display:block;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(21,16,31,.6);margin-bottom:.45rem;font-weight:600}
.aw-field input{width:100%;background:rgba(255,255,255,.7);border:1.5px solid #15101F;border-radius:12px;padding:.95rem 1rem;color:#15101F;font-family:"General Sans",sans-serif;font-size:1rem;outline:none;transition:box-shadow .3s,background .3s}
.aw-field input:focus{background:#fff;box-shadow:4px 4px 0 #15101F}
.aw-field input::placeholder{color:rgba(21,16,31,.4)}
.aw-btn{position:relative;overflow:hidden;width:100%;margin-top:.8rem;padding:1.05rem;border:none;border-radius:100px;cursor:pointer;
  font-family:"Clash Display",sans-serif;font-weight:600;font-size:1.02rem;color:#FCFCFC;background:#0A0A0A;

.aw-btn:hover{transform:translateY(-3px);box-shadow:0 18px 40px -16px rgba(0,0,0,.6)}
.aw-btn svg{width:18px;height:18px;stroke:#FCFCFC;transition:transform .35s}
.aw-btn:hover svg{transform:translateX(5px)}
.aw-btn::after{content:"";position:absolute;top:0;left:-60%;width:38%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);transform:skewX(-20deg)}
.aw-btn:hover::after{animation:awshine .85s ease}
@keyframes awshine{from{left:-60%}to{left:130%}}
.aw-err{color:#7a1f0c;font-size:.86rem;margin-top:.9rem;height:1.1em;opacity:0;transition:opacity .3s;font-weight:600}
.aw-err.show{opacity:1}
.aw-pin.shake{animation:shk .5s}
@keyframes awup{to{opacity:1;transform:none}}
@keyframes shk{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}
@media(max-width:860px){.aw-split{grid-template-columns:1fr}.aw-stage{padding-top:clamp(110px,22vh,160px)}.aw-tag{font-size:clamp(2.1rem,9vw,2.9rem)}.aw-foot{display:none}}

function b64(s){const b=atob(s),u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}
async function unlock(id,pw){
  if(!(window.crypto&&crypto.subtle)) throw new Error("insecure-context");
  const raw=b64(PAYLOAD), salt=raw.slice(0,16), iv=raw.slice(16,28), ct=raw.slice(28);
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw",enc.encode(id.trim().toLowerCase()+SEP+pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);
  return new TextDecoder().decode(pt);
}
async function offerSave(id,pw){
  try{
    if(window.PasswordCredential && navigator.credentials && navigator.credentials.store){
      const cred=new PasswordCredential({id:id, name:id, password:pw});
      await navigator.credentials.store(cred);
    }
  }catch(e){}
}
(function(){
  const box=document.getElementById("login"), card=document.getElementById("loginCard"),
        err=document.getElementById("lgErr"), idF=document.getElementById("lgId"),
        pwF=document.getElementById("lgPw"), btn=document.getElementById("lgBtn"),
        form=document.getElementById("lgForm");
  let busy=false;
  function fail(msg){ if(msg) err.textContent=msg; err.classList.add("show"); card.classList.add("shake");
    setTimeout(()=>card.classList.remove("shake"),500); pwF.select(); }
  async function attempt(){
    if(busy) return; busy=true; err.classList.remove("show");
    try{
      const doc=await unlock(idF.value,pwF.value);
      await offerSave(idF.value, pwF.value);
      box.classList.add("out");
      setTimeout(()=>{try{history.scrollRestoration="manual";}catch(_){}try{if(location.hash)history.replaceState(null,"",location.pathname+location.search);}catch(_){}document.open();document.write(doc);document.close();try{window.scrollTo(0,0);}catch(_){}requestAnimationFrame(function(){try{window.scrollTo(0,0);}catch(_){}});},700);
    }catch(e){
      busy=false;
      fail(e.message==="insecure-context"
        ? "Ouvrez cette page via votre lien sécurisé (https)."
        : "Identifiant ou mot de passe incorrect.");
    }
  }
  if(form){ form.addEventListener("submit",function(e){e.preventDefault();attempt();}); }
  else { btn.addEventListener("click",attempt);
         [idF,pwF].forEach(el=>el.addEventListener("keydown",e=>{if(e.key==="Enter")attempt();})); }
  setTimeout(()=>idF.focus(),200);
  const fx=box.querySelector(".aw-fx");
  box.addEventListener("pointermove",e=>{
    const r=box.getBoundingClientRect(), nx=(e.clientX-r.left)/r.width, ny=(e.clientY-r.top)/r.height;
    box.style.setProperty("--mx",(Math.max(0,Math.min(1,nx))*100)+"%");
    box.style.setProperty("--my",(Math.max(0,Math.min(1,ny))*100)+"%");
    if(fx) fx.style.transform=`translate(${(.5-nx)*70}px,${(.5-ny)*70}px) scale(1.06)`;
  });
})();
</script>
